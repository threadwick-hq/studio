<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>stitchgrid</title><style>
:root {
  --bg: #eef1f6;
  --panel: #ffffff;
  --ink: #1c2430;
  --muted: #6b7888;
  --line: #dbe2ec;
  --line-soft: #eaeef4;
  --accent: #2f7bff;
  --accent-soft: #e8f0ff;
  --danger: #d9453b;
  --radius: 9px;
  --shadow: 0 1px 2px rgba(20, 30, 50, .06), 0 6px 18px rgba(20, 30, 50, .06);
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  color: var(--ink);
  background: var(--bg);
  display: grid;
  grid-template-rows: auto auto 1fr;
  overflow: hidden;
  font-size: 13px;
}

/* ---- top bar ---- */
#topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
}
.brand { font-weight: 800; font-size: 16px; letter-spacing: -.2px; white-space: nowrap; }
.brand-mark { color: var(--accent); }
.title-input {
  font-size: 14px; font-weight: 600;
  border: 1px solid transparent; border-radius: 7px;
  padding: 6px 10px; min-width: 220px; background: var(--line-soft); color: var(--ink);
}
.title-input:focus { outline: none; border-color: var(--accent); background: #fff; }
.spacer { flex: 1; }
.group { display: flex; gap: 4px; }

/* ---- buttons ---- */
.btn {
  font: inherit; font-size: 12px;
  border: 1px solid var(--line); background: #fff; color: var(--ink);
  padding: 6px 11px; border-radius: 7px; cursor: pointer; white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn:disabled { opacity: .4; cursor: default; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.05); color: #fff; }
.btn.wide { display: block; width: 100%; margin-top: 6px; text-align: center; }
.btn.danger { color: var(--danger); border-color: #f0c4c0; }
.btn.danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
.icon-btn {
  font: inherit; font-size: 15px; line-height: 1;
  border: 1px solid var(--line); background: #fff; color: var(--ink);
  width: 30px; height: 30px; border-radius: 7px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
.icon-btn:disabled { opacity: .35; cursor: default; }
.link { font: inherit; font-size: 11px; border: 0; background: none; color: var(--accent); cursor: pointer; padding: 0; }
.link:hover { text-decoration: underline; }

/* ---- toolbar ---- */
#toolbar {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px 14px;
  padding: 7px 14px; background: var(--panel); border-bottom: 1px solid var(--line);
}
.tgroup { display: flex; align-items: center; gap: 6px; padding-right: 10px; border-right: 1px solid var(--line-soft); }
.tgroup:last-child { border-right: 0; }
.tlabel { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 700; }
.tool {
  font: inherit; font-size: 12px; border: 1px solid var(--line); background: #fff;
  padding: 6px 10px; border-radius: 7px; cursor: pointer;
}
.tool:hover { border-color: var(--accent); }
.tool.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.ctl { font: inherit; font-size: 12px; padding: 5px 6px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
.chk { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--ink); }
.num { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
.num input { width: 46px; font: inherit; font-size: 12px; padding: 4px 5px; border: 1px solid var(--line); border-radius: 6px; }

/* ---- workspace ---- */
#workspace { display: grid; grid-template-columns: 248px 1fr 264px; min-height: 0; }
.sidebar { background: var(--panel); overflow-y: auto; padding: 4px 0; }
#left { border-right: 1px solid var(--line); }
#right { border-left: 1px solid var(--line); }
.panel { padding: 12px 14px; border-bottom: 1px solid var(--line-soft); }
.panel h3 {
  margin: 0 0 9px; font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
  color: var(--muted); font-weight: 700; display: flex; align-items: center; justify-content: space-between;
}
.empty { color: var(--muted); font-size: 12px; margin: 2px 0; }
.hint { color: var(--muted); font-size: 11px; margin: 8px 0 0; line-height: 1.4; }

/* ---- palette chips ---- */
.chips { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
#palette-clusters.chips, #palette-motifs.chips { grid-template-columns: repeat(2, 1fr); }
.chip {
  position: relative; border: 1px solid var(--line); border-radius: var(--radius);
  background: #fff; cursor: pointer; padding: 6px 4px 4px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.chip:hover { border-color: var(--accent); }
.chip.active { border-color: var(--accent); background: var(--accent-soft); box-shadow: inset 0 0 0 1px var(--accent); }
.chip-glyph { display: flex; align-items: center; justify-content: center; height: 38px; }
.chip-glyph svg { display: block; }
.chip-label { font-size: 10px; color: var(--muted); text-align: center; line-height: 1.1; }
.chip-x, .chip-edit {
  position: absolute; top: 2px; width: 16px; height: 16px; border-radius: 50%;
  font-size: 11px; line-height: 16px; text-align: center; color: var(--muted);
  background: var(--line-soft); display: none;
}
.chip-x { right: 2px; }
.chip-edit { left: 2px; }
.chip:hover .chip-x, .chip:hover .chip-edit { display: block; }
.chip-x:hover { background: var(--danger); color: #fff; }
.chip-edit:hover { background: var(--accent); color: #fff; }

/* ---- canvas ---- */
#canvas-wrap { position: relative; background:
    radial-gradient(circle at center, #ffffff 0, #f7f9fc 70%, #eef1f6 100%); overflow: hidden; }
#canvas { width: 100%; height: 100%; display: block; touch-action: none; }
#canvas-wrap[data-tool="place"] #canvas { cursor: crosshair; }
#canvas-wrap[data-tool="select"] #canvas { cursor: default; }
#canvas-wrap[data-tool="pan"] #canvas { cursor: grab; }
.canvas-hint {
  position: absolute; left: 50%; bottom: 12px; transform: translateX(-50%);
  font-size: 11px; color: var(--muted); background: rgba(255, 255, 255, .85);
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--line); pointer-events: none;
}
.stitch .hit { pointer-events: all; } /* invisibility is inline (fill:none) */
.stitch { cursor: pointer; }
#canvas .guides, #canvas .selection, #canvas .anchors, #canvas .cursor-layer { pointer-events: none; }

/* ---- inspector ---- */
.insp-summary { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
.insp-field { display: grid; grid-template-columns: 78px 1fr; align-items: center; gap: 8px; margin-bottom: 8px; }
.insp-label { font-size: 11px; color: var(--muted); }
.field { font: inherit; font-size: 12px; padding: 5px 7px; border: 1px solid var(--line); border-radius: 6px; background: #fff; width: 100%; }
.btn-row { display: flex; align-items: center; gap: 6px; }
.rot-readout { font-size: 12px; color: var(--muted); min-width: 34px; text-align: center; }
.swatches { display: flex; flex-wrap: wrap; gap: 4px; }
.swatch { width: 20px; height: 20px; border-radius: 5px; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--line); cursor: pointer; padding: 0; }
.swatch.active { box-shadow: 0 0 0 2px var(--accent); }
.swatch-custom { width: 24px; height: 24px; padding: 0; border: 1px solid var(--line); border-radius: 5px; background: #fff; cursor: pointer; }

/* ---- rounds ---- */
.round-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.round-row.add { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--line); }
.round-label { font-size: 12px; color: var(--muted); width: 26px; }
.mini { width: 64px; font: inherit; font-size: 12px; padding: 4px 6px; border: 1px solid var(--line); border-radius: 6px; }

/* ---- legend ---- */
.legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 4px; }
.legend-glyph { width: 30px; display: flex; justify-content: center; }
.legend-glyph svg { display: block; }

/* ---- modal ---- */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(20, 30, 50, .4);
  display: flex; align-items: center; justify-content: center; z-index: 50;
}
.modal { background: #fff; border-radius: 12px; box-shadow: var(--shadow); width: min(560px, 92vw); max-height: 90vh; overflow: auto; }
.modal-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--line); }
.modal-head h2 { margin: 0; font-size: 16px; }
.modal-body { padding: 18px; }
.modal-footer { padding: 12px 18px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 8px; }

.cluster-editor { display: grid; grid-template-columns: 150px 1fr; gap: 18px; }
.cluster-preview {
  display: flex; align-items: center; justify-content: center;
  background: var(--line-soft); border-radius: 10px; min-height: 150px;
}
.cluster-fields .insp-field { grid-template-columns: 120px 1fr; }

/* ---- help ---- */
#help-btn { font-weight: 600; }
.help { display: grid; gap: 18px; }
.help-section h3 { margin: 0 0 6px; font-size: 13px; }
.help-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.help-table td { padding: 4px 10px 4px 0; vertical-align: top; line-height: 1.5; }
.help-key { white-space: nowrap; color: var(--muted); width: 36%; }
.help b { color: var(--ink); }
.help code { background: var(--line-soft); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
kbd {
  font: 600 11px ui-monospace, Menlo, Consolas, monospace;
  background: var(--line-soft); border: 1px solid var(--line);
  border-bottom-width: 2px; border-radius: 5px; padding: 1px 5px; color: var(--ink);
}

    <div class="group">

      <button id="export-svg" class="btn" title="Export the chart as a vector SVG">SVG</button>

      <button id="export-pdf" class="btn" title="Open a print view (Save as PDF)">Print / PDF</button>

    <button id="help-btn" class="btn" title="Help, keyboard shortcuts, and how corners work">? Help</button>
  </header>

  <div id="toolbar">
    <div class="tgroup">
      <span class="tlabel">Tool</span>
      <button class="tool" data-tool="select" id="tool-select" title="Select / move (V)">◻ Select</button>
      <button class="tool" data-tool="place" id="tool-place" title="Place stitch (P)">✎ Place</button>
      <button class="tool" data-tool="pan" id="tool-pan" title="Pan (H / hold space)">✋ Pan</button>
    </div>

    <div class="tgroup">
      <span class="tlabel">Symmetry</span>
      <select id="sym-order" class="ctl" title="Rotational symmetry"></select>
      <label class="chk"><input type="checkbox" id="sym-mirror" /> mirror</label>
    </div>

    <div class="tgroup">
      <span class="tlabel">Snap</span>
      <select id="snap-mode" class="ctl" title="Snapping mode">
        <option value="polar">Rings + spokes</option>
        <option value="grid">Square grid</option>
        <option value="off">Off</option>
      </select>
      <label class="chk"><input type="checkbox" id="snap-ring" checked /> rings</label>
      <label class="chk"><input type="checkbox" id="snap-spoke" checked /> spokes</label>
      <label class="num">spokes <input type="number" id="snap-spoke-count" value="24" min="1" /></label>
      <label class="num">grid <input type="number" id="snap-grid-step" value="24" min="2" /></label>
      <label class="chk"><input type="checkbox" id="snap-autoradial" checked /> auto-radial</label>
    </div>

    <div class="tgroup">
      <span class="tlabel">Guides</span>
      <label class="chk"><input type="checkbox" id="guide-show" checked /> show</label>
      <label class="chk"><input type="checkbox" id="guide-anchors" /> anchors</label>
    </div>

    <div class="tgroup">
      <span class="tlabel">View</span>
      <button id="zoom-out" class="icon-btn" title="Zoom out">−</button>
      <button id="zoom-fit" class="btn" title="Fit to content">Fit</button>
      <button id="zoom-in" class="icon-btn" title="Zoom in">+</button>
    </div>

    <div class="tgroup">
      <button id="btn-undo" class="icon-btn" title="Undo (Ctrl+Z)">↶</button>
      <button id="btn-redo" class="icon-btn" title="Redo (Ctrl+Shift+Z)">↷</button>
    </div>
  </div>

  <main id="workspace">
    <aside id="left" class="sidebar">
      <section class="panel">
        <h3 title="The centre you start from — every stitch ultimately comes from here">Start (round 0)</h3>
        <div id="palette-starts" class="chips"></div>
      </section>
      <section class="panel">
        <h3>Stitches</h3>
        <div id="palette-stitches" class="chips"></div>
      </section>
      <section class="panel">
        <h3>Clusters <button id="btn-new-cluster" class="link">+ new</button></h3>
        <div id="palette-clusters" class="chips"></div>
      </section>
      <section class="panel">
        <h3>Motifs <button id="btn-create-motif" class="link">+ from selection</button></h3>
        <div id="palette-motifs" class="chips"></div>
      </section>
    </aside>

    <section id="canvas-wrap" data-tool="place">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="canvas-hint">Click to place · drag to move · scroll to zoom · hold space to pan</div>
    </section>

    <aside id="right" class="sidebar">
      <section class="panel">
        <h3>Selection</h3>
        <div id="inspector"></div>
      </section>
      <section class="panel">
        <h3>Rounds</h3>
        <div id="rounds-list" class="rounds"></div>
      </section>
      <section class="panel">
        <h3>Distribute evenly</h3>
        <div id="distribute-form"></div>
      </section>
      <section class="panel">
        <h3>Legend</h3>
        <div id="legend-box" class="legend"></div>
      </section>
    </aside>
  </main>
